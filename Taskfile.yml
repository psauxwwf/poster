version: "3"

dotenv: ["build.env"]

vars:
  gobin: go
  ldflags: "-extldflags '-static' -w -s -buildid="
  gcflags: "all=-trimpath={{.PWD}} -dwarf=false -l"
  asmflags: "all=-trimpath={{.PWD}}"
  bin: "{{.PWD}}/bin"
  app: "poster"
  app_bin: "{{.bin}}/{{.app}}"
  repo_name:
    sh: basename "{{.PWD}}"
  release_linux_archive: "{{.bin}}/{{.repo_name}}_linux_amd64.tar.gz"

env:
  COMPOSE_BAKE: true
  CGO_ENABLED: 0
  GOARCH: amd64
  GOOS: linux

tasks:
  setup:
    desc: set up the environment
    internal: true
    silent: true
    cmds:
      - mkdir -p {{.bin}}

  build:
    desc: common build
    deps:
      - setup
    cmds:
      - >
        {{.gobin}} build
        -tags netgo
        -ldflags="{{.ldflags}}"
        -trimpath
        -gcflags="{{.gcflags}}"
        -asmflags="{{.asmflags}}"
        -o {{.app_bin}} cmd/{{.app}}/main.go
      - strip {{.app_bin}}
      - objcopy --strip-unneeded {{.app_bin}}

  release:
    desc: build and publish github release
    deps:
      - build
    cmds:
      - tar -czf {{.release_linux_archive}} -C {{.bin}} {{.app}}
      - |
        TAG=$(date +v%m.%d.%H)
        gh release create "$TAG" {{.release_linux_archive}}

  package:
    desc: build and push docker image
    cmds:
      - docker compose -f docker-compose.yaml build
      - docker compose -f docker-compose.yaml push

  docker:up:
    desc: build binaries and start app containers
    cmds:
      - docker compose -f docker-compose.yaml up --build --force-recreate
