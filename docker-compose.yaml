services:
  poster:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=registry,ref=ghcr.io/psauxwwf/poster:latest
      cache_to:
        - type=inline
    image: ghcr.io/psauxwwf/poster:latest
    container_name: poster
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - ~/.notebooklm:/root/.notebooklm
      - ./dist:/poster/dist
    networks:
      - poster
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_ID: ${TELEGRAM_ADMIN_ID}

  # watchtower:
