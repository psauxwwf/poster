services:
  poster:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/devil666face/poster:latest
    container_name: poster
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - ~/.notebooklm:/root/.notebooklm
    network_mode: "host"
