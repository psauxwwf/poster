  #     WATCHTOWER_TRACE: "true"
  #     WATCHTOWER_REGISTRY_AUTH: "true"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ~/.docker/config.json:/config.json:ro
  #   command: --debug poster
  #   networks:
  #     - poster

networks:
  poster:
    name: poster
    driver: bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.22.100.0/24
          gateway: 172.22.100.1
